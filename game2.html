<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Fira+Code&display=swap');
        
        body { 
            background: #000; color: #0f0; font-family: 'Fira Code', monospace; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; margin: 0; 
            overflow: hidden; touch-action: none; 
        }

        /* --- LOADING SCREEN --- */
        #loading-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .load-text { font-family: 'Orbitron', sans-serif; color: #ff003c; margin-bottom: 20px; letter-spacing: 5px; }
        .progress-bar { width: 250px; height: 4px; background: #111; border: 1px solid #ff003c; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #ff003c; box-shadow: 0 0 15px #ff003c; transition: width 0.1s; }
        .status-text { margin-top: 15px; font-size: 10px; color: #0f0; }

        /* --- GAME UI --- */
        .logo-container { margin-bottom: 5px; animation: glowPulse 2s infinite; }
        @keyframes glowPulse {
            0% { filter: drop-shadow(0 0 2px #ff003c); }
            50% { filter: drop-shadow(0 0 8px #ff003c); }
            100% { filter: drop-shadow(0 0 2px #ff003c); }
        }

        .ghost-header { 
            font-family: 'Orbitron', sans-serif; color: #ff003c; 
            font-size: 1.4rem; margin-bottom: 5px; text-shadow: 0 0 10px #ff003c; 
        }
        
        #board-frame { background: #111; padding: 6px; border: 2px solid #0f0; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        #board { display: grid; grid-template-columns: repeat(8, 42px); grid-template-rows: repeat(8, 42px); gap: 2px; }
        .cell { background: #080808; width: 42px; height: 42px; border: 1px solid #1a1a1a; box-sizing: border-box; }
        .cell.ghost { background: rgba(0, 242, 255, 0.5) !important; border: 1px solid #0ff; box-shadow: inset 0 0 10px #0ff; }

        #pieces-area { display: flex; gap: 15px; margin-top: 30px; min-height: 110px; justify-content: center; width: 100%; align-items: center; }
        .piece-container { display: grid; gap: 2px; touch-action: none; }
        .piece-cell { width: 18px; height: 18px; border-radius: 2px; }
        
        .dragging { position: fixed; pointer-events: none; z-index: 1000; display: grid; gap: 2px; }
        .dragging .piece-cell { width: 42px; height: 42px; opacity: 0.8; box-shadow: 0 0 15px currentColor; }
        
        .score-ui { color: #00f2ff; font-family: 'Orbitron', sans-serif; font-size: 1rem; margin-bottom: 10px; }

        .nav-container { display: flex; gap: 10px; margin-top: 25px; }
        .btn { border: 1px solid; padding: 6px 15px; font-size: 9px; uppercase font-bold tracking-widest rounded-sm; transition: 0.3s; }
        .btn-reset { border-color: #ff003c; color: #ff003c; }
        .btn-exit { border-color: #00f2ff; color: #00f2ff; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="load-text">GHOST-DESTRO</div>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
        <div id="status" class="status-text">INITIALIZING CORE...</div>
    </div>

    <div class="logo-container">
        <svg width="50" height="50" viewBox="0 0 100 100">
            <path d="M50 10 C30 10 15 25 15 45 C15 60 25 70 35 75 L35 85 L65 85 L65 75 C75 70 85 60 85 45 C85 25 70 10 50 10 Z" fill="black" stroke="#ff003c" stroke-width="4"/>
            <circle cx="35" cy="45" r="3" fill="#ff003c"><animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" /></circle>
            <circle cx="65" cy="45" r="3" fill="#ff003c"><animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" /></circle>
            <text x="50" y="32" font-family="Orbitron" font-size="12" font-weight="900" fill="#ff003c" text-anchor="middle">GD</text>
        </svg>
    </div>

    <h1 class="ghost-header">BLOCK BLAST</h1>
    <div class="score-ui">ID_LINK: <span id="score">000</span></div>
    
    <div id="board-frame">
        <div id="board"></div>
    </div>

    <div id="pieces-area"></div>

    <div class="nav-container">
        <button onclick="window.location.href='index.html'" class="btn btn-exit">EXIT </button>
        <button onclick="location.reload()" class="btn btn-reset">REBOOT</button>
    </div>

    <script>
        // --- LOADING LOGIC ---
        const fill = document.getElementById('fill');
        const status = document.getElementById('status');
        const loader = document.getElementById('loading-screen');
        const msg = ["DECRYPTING ASSETS...", "CONNECTING TO DATABASE...", "INJECTING SCRIPTS...", "BYPASSING FIREWALL...", "SYSTEM READY!"];
        
        let p = 0;
        let interval = setInterval(() => {
            p += Math.random() * 5;
            if(p >= 100) {
                p = 100;
                clearInterval(interval);
                setTimeout(() => loader.style.display = 'none', 500);
            }
            fill.style.width = p + '%';
            status.innerText = msg[Math.floor((p/100) * msg.length)];
        }, 80)

        // --- GAME LOGIC (ULTRA SENSITIVE) ---
        const boardEl = document.getElementById('board');
        const piecesArea = document.getElementById('pieces-area');
        const scoreEl = document.getElementById('score');
        let score = 0;
        let boardMatrix = Array(8).fill().map(() => Array(8).fill(0));
        const colors = ['#00f2ff', '#ff003c', '#00ff88', '#ffcc00', '#ff00ff'];
        const shapes = [
            { s: [[1,1],[1,1]], w:2, h:2 }, { s: [[1,1,1,1]], w:4, h:1 }, 
            { s: [[1,1,1]], w:3, h:1 }, { s: [[1,1,1],[0,1,0]], w:3, h:2 },
            { s: [[1,0],[1,0],[1,1]], w:2, h:3 }, { s: [[1,1,1],[1,1,1],[1,1,1]], w:3, h:3 },
            { s: [[1,1,0],[0,1,1]], w:3, h:2 }, { s: [[1]], w:1, h:1 }
        ];

        for (let i = 0; i < 64; i++) boardEl.appendChild(document.createElement('div')).className = 'cell';

        function generate() {
            piecesArea.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const data = shapes[Math.floor(Math.random() * shapes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const con = document.createElement('div');
                con.className = 'piece-container';
                con.style.gridTemplateColumns = `repeat(${data.w}, 1fr)`;
                data.s.flat().forEach(v => {
                    const c = document.createElement('div'); c.className='piece-cell';
                    if(v) c.style.background = color; else c.style.opacity = '0';
                    con.appendChild(c);
                });

                con.addEventListener('touchstart', (e) => {
                    const clone = con.cloneNode(true);
                    clone.classList.add('dragging');
                    clone.style.color = color;
                    document.body.appendChild(clone);

                    const move = (me) => {
                        const t = me.touches[0];
                        const dX = t.pageX, dY = t.pageY - 110;
                        clone.style.left = (dX - (data.w * 21)) + 'px';
                        clone.style.top = (dY - (data.h * 21)) + 'px';

                        document.querySelectorAll('.cell').forEach(c => c.classList.remove('ghost'));
                        const b = boardEl.getBoundingClientRect();
                        if (dX > b.left && dX < b.right && dY > b.top && dY < b.bottom) {
                            const col = Math.floor((dX - b.left) / 44), row = Math.floor((dY - b.top) / 44);
                            if (canPlace(data, row, col)) {
                                for(let r=0; r<data.h; r++) for(let c=0; c<data.w; c++) {
                                    if(data.s[r][c]) {
                                        const idx = (row + r) * 8 + (col + c);
                                        if (idx < 64 && (col+c) < 8) boardEl.children[idx].classList.add('ghost');
                                    }
                                }
                            }
                        }
                    };

                    const end = (ee) => {
                        const t = ee.changedTouches[0];
                        const b = boardEl.getBoundingClientRect();
                        const fX = t.pageX, fY = t.pageY - 110;
                        const col = Math.floor((fX - b.left) / 44), row = Math.floor((fY - b.top) / 44);
                        if (canPlace(data, row, col)) {
                            place(data, row, col, color);
                            con.remove();
                            clear();
                            if (piecesArea.children.length === 0) generate();
                        }
                        clone.remove();
                        document.querySelectorAll('.cell').forEach(c => c.classList.remove('ghost'));
                        document.removeEventListener('touchmove', move);
                        document.removeEventListener('touchend', end);
                    };
                    document.addEventListener('touchmove', move);
                    document.addEventListener('touchend', end);
                });
                piecesArea.appendChild(con);
            }
        }

        function canPlace(d, r, c) {
            if (r < 0 || c < 0 || r + d.h > 8 || c + d.w > 8) return false;
            for(let i=0; i<d.h; i++) for(let j=0; j<d.w; j++) if(d.s[i][j] && boardMatrix[r+i][c+j]) return false;
            return true;
        }

        function place(d, r, c, col) {
            for(let i=0; i<d.h; i++) for(let j=0; j<d.w; j++) if(d.s[i][j]) {
                boardMatrix[r+i][c+j] = col;
                const el = boardEl.children[(r+i)*8+(c+j)];
                el.style.background = col; el.style.boxShadow = `0 0 12px ${col}`; el.style.border = "none";
            }
            score += 25; scoreEl.innerText = score.toString().padStart(3, '0');
        }

        function clear() {
            let rs = [], cs = [];
            for(let r=0; r<8; r++) if(boardMatrix[r].every(v => v !== 0)) rs.push(r);
            for(let c=0; c<8; c++) {
                let f = true; for(let r=0; r<8; r++) if(!boardMatrix[r][c]) f = false;
                if(f) cs.push(c);
            }
            rs.forEach(r => { boardMatrix[r].fill(0); for(let i=0; i<8; i++) reset(r, i); });
            cs.forEach(c => { for(let i=0; i<8; i++) { boardMatrix[i][c] = 0; reset(i, c); } });
            if(rs.length || cs.length) score += 100;
            scoreEl.innerText = score.toString().padStart(3, '0');
        }

        function reset(r, c) {
            const el = boardEl.children[r*8+c];
            el.style.background = '#080808'; el.style.boxShadow = 'none'; el.style.border = '1px solid #1a1a1a';
        }

        generate();
    </script>
</body>
</html>
