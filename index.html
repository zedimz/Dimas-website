<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; background: #050505; color: #00d4ff; 
            font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; height: 100vh; text-align: center;
        }

        /* Gasing Biru */
        .spinner {
            width: 40px; height: 40px; border: 4px solid #1a1a1a;
            border-top: 4px solid #00d4ff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 20px;
            box-shadow: 0 0 15px #00d4ff;
        }

        /* Video 16:9 */
        .video-container {
            width: 80%; max-width: 600px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 10px; overflow: hidden;
            border: 2px solid #00d4ff; box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        #loadingVideo { width: 100%; height: 100%; object-fit: cover; }

        /* Teks Proses */
        #status-msg { margin-top: 20px; font-size: 1rem; height: 20px; }
        #percent { font-size: 2.5rem; font-weight: bold; margin-top: 10px; text-shadow: 0 0 10px #00d4ff; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>

    <div class="video-container">
        <video id="loadingVideo" autoplay muted loop playsinline>
            <source src="justmin.mp4" type="video/mp4">
        </video>
    </div>

    <div id="status-msg">Inisialisasi sistem...</div>
    <div id="percent">0%</div>

    <script>
        const pText = document.getElementById('percent');
        const msg = document.getElementById('status-msg');
        const tasks = [
            "Memuat...",
            "Melindungi port dari serangan bot...",
            " loading ...",
            " koneksi aman...",
            "Akses diterima..."
        ];

        let p = 0;
        const interval = setInterval(() => {
            p++;
            pText.innerText = p + "%";

            // Ganti teks tiap 20% (5 detik total / 5 teks = 1 detik per teks)
            if (p === 20) msg.innerText = tasks[1];
            if (p === 40) msg.innerText = tasks[2];
            if (p === 60) msg.innerText = tasks[3];
            if (p === 80) msg.innerText = tasks[4];
            
            if(p >= 100) {
                clearInterval(interval);
                window.location.href = "login.html";
            }
        }, 70); // 50ms * 100 = 5000ms (5 detik)
    </script>
</body>
</html>
